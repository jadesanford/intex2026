        id:
          type: integer
        name:
          type: string
        region:
          type: string
        city:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        capacity:
          type: integer
        currentOccupancy:
          type: integer
        status:
          type: string
      required: [id, name, region, city, latitude, longitude, capacity, currentOccupancy, status]

    DonationTrendPoint:
