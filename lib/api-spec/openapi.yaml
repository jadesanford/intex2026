openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Open Arms nonprofit management system API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: public
    description: Public-facing endpoints
  - name: auth
    description: Authentication
  - name: safehouses
    description: Safehouse management
  - name: residents
    description: Resident case management
  - name: donations
    description: Donation and supporter management
  - name: supporters
    description: Supporter profiles
  - name: partners
    description: Partner organizations
  - name: sessions
    description: Counseling process recordings
  - name: visitations
    description: Home visitations
  - name: health-records
    description: Health and wellbeing records
  - name: education
    description: Education records
  - name: interventions
    description: Intervention plans
  - name: incidents
    description: Incident reports
  - name: analytics
    description: Reports and analytics
  - name: social-media
    description: Social media posts

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Public Impact Dashboard ──────────────────────────────────────────────
  /public/impact-snapshot:
    get:
      operationId: getPublicImpactSnapshot
      tags: [public]
      summary: Get aggregated public impact data
      responses:
        "200":
          description: Public impact snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicImpactSnapshot"

  /public/safehouses:
    get:
      operationId: getPublicSafehouses
      tags: [public]
      summary: Get safehouse demo locations for map
      responses:
        "200":
          description: List of demo safehouse locations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PublicSafehouse"

  /public/donation-trends:
    get:
      operationId: getPublicDonationTrends
      tags: [public]
      summary: Get aggregated donation trends for public dashboard
      responses:
        "200":
          description: Donation trend data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DonationTrendPoint"

  /public/outcome-metrics:
    get:
      operationId: getPublicOutcomeMetrics
      tags: [public]
      summary: Get aggregated resident outcome metrics
      responses:
        "200":
          description: Outcome metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutcomeMetrics"

  /public/contact:
    post:
      operationId: submitContactForm
      tags: [public]
      summary: Submit contact/help request form
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactFormBody"
      responses:
        "200":
          description: Form submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ── Authentication ───────────────────────────────────────────────────────
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with username and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Admin Dashboard Summary ──────────────────────────────────────────────
  /admin/dashboard-summary:
    get:
      operationId: getAdminDashboardSummary
      tags: [analytics]
      summary: Get admin dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDashboardSummary"

  # ── Safehouses ───────────────────────────────────────────────────────────
  /safehouses:
    get:
      operationId: listSafehouses
      tags: [safehouses]
      summary: List all safehouses
      responses:
        "200":
          description: List of safehouses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Safehouse"
    post:
      operationId: createSafehouse
      tags: [safehouses]
      summary: Create a new safehouse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSafehouseBody"
      responses:
        "201":
          description: Safehouse created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Safehouse"

  /safehouses/{id}:
    get:
      operationId: getSafehouse
      tags: [safehouses]
      summary: Get a safehouse by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Safehouse detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Safehouse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateSafehouse
      tags: [safehouses]
      summary: Update a safehouse
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSafehouseBody"
      responses:
        "200":
          description: Updated safehouse
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Safehouse"

  /safehouses/{id}/metrics:
    get:
      operationId: getSafehouseMetrics
      tags: [safehouses]
      summary: Get monthly metrics for a safehouse
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Safehouse monthly metrics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SafehouseMonthlyMetric"

  # ── Residents ────────────────────────────────────────────────────────────
  /residents:
    get:
      operationId: listResidents
      tags: [residents]
      summary: List residents with optional filters
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          schema:
            type: ["string", "null"]
        - name: safehouseId
          in: query
          schema:
            type: ["integer", "null"]
        - name: riskLevel
          in: query
          schema:
            type: ["string", "null"]
        - name: search
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Paginated resident list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedResidents"
    post:
      operationId: createResident
      tags: [residents]
      summary: Create a new resident record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateResidentBody"
      responses:
        "201":
          description: Resident created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resident"

  /residents/{id}:
    get:
      operationId: getResident
      tags: [residents]
      summary: Get a resident by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Resident detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resident"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateResident
      tags: [residents]
      summary: Update a resident record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateResidentBody"
      responses:
        "200":
          description: Updated resident
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resident"
    delete:
      operationId: deleteResident
      tags: [residents]
      summary: Delete a resident record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /residents/{id}/risk-indicators:
    get:
      operationId: getResidentRiskIndicators
      tags: [residents]
      summary: Get AI-style risk indicators for a resident
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Risk indicator analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResidentRiskIndicators"

  # ── Process Recordings (Counseling Sessions) ─────────────────────────────
  /residents/{residentId}/sessions:
    get:
      operationId: listResidentSessions
      tags: [sessions]
      summary: List counseling sessions for a resident
      parameters:
        - name: residentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProcessRecording"
    post:
      operationId: createResidentSession
      tags: [sessions]
      summary: Create a counseling session entry
      parameters:
        - name: residentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProcessRecordingBody"
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessRecording"

  /sessions/{id}:
    patch:
      operationId: updateSession
      tags: [sessions]
      summary: Update a counseling session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProcessRecordingBody"
      responses:
        "200":
          description: Updated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessRecording"
    delete:
      operationId: deleteSession
      tags: [sessions]
      summary: Delete a counseling session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Home Visitations ─────────────────────────────────────────────────────
  /residents/{residentId}/visitations:
    get:
      operationId: listResidentVisitations
      tags: [visitations]
      summary: List home visitations for a resident
      parameters:
        - name: residentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of visitations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HomeVisitation"
    post:
      operationId: createResidentVisitation
      tags: [visitations]
      summary: Log a home visitation
      parameters:
        - name: residentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHomeVisitationBody"
      responses:
        "201":
          description: Visitation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HomeVisitation"

  /visitations/{id}:
    patch:
      operationId: updateVisitation
      tags: [visitations]
      summary: Update a home visitation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateHomeVisitationBody"
      responses:
        "200":
          description: Updated visitation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HomeVisitation"

  # ── Health Records ───────────────────────────────────────────────────────
  /residents/{residentId}/health-records:
    get:
      operationId: listResidentHealthRecords
      tags: [health-records]
      summary: List health records for a resident
      parameters:
        - name: residentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of health records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HealthWellbeingRecord"
    post:
      operationId: createResidentHealthRecord
      tags: [health-records]
      summary: Create a health record for a resident
      parameters:
        - name: residentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHealthRecordBody"
      responses:
        "201":
          description: Health record created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthWellbeingRecord"

  # ── Education Records ────────────────────────────────────────────────────
  /residents/{residentId}/education-records:
    get:
      operationId: listResidentEducationRecords
      tags: [education]
      summary: List education records for a resident
      parameters:
        - name: residentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of education records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EducationRecord"
    post:
      operationId: createResidentEducationRecord
      tags: [education]
      summary: Create an education record for a resident
      parameters:
        - name: residentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEducationRecordBody"
      responses:
        "201":
          description: Education record created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EducationRecord"

  # ── Intervention Plans ───────────────────────────────────────────────────
  /residents/{residentId}/interventions:
    get:
      operationId: listResidentInterventions
      tags: [interventions]
      summary: List intervention plans for a resident
      parameters:
        - name: residentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of intervention plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InterventionPlan"
    post:
      operationId: createResidentIntervention
      tags: [interventions]
      summary: Create an intervention plan for a resident
      parameters:
        - name: residentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInterventionPlanBody"
      responses:
        "201":
          description: Intervention plan created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterventionPlan"

  # ── Incident Reports ─────────────────────────────────────────────────────
  /incidents:
    get:
      operationId: listIncidents
      tags: [incidents]
      summary: List all incident reports
      parameters:
        - name: residentId
          in: query
          schema:
            type: ["integer", "null"]
        - name: severity
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: List of incidents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IncidentReport"
    post:
      operationId: createIncident
      tags: [incidents]
      summary: Create an incident report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIncidentBody"
      responses:
        "201":
          description: Incident report created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IncidentReport"

  /incidents/{id}:
    patch:
      operationId: updateIncident
      tags: [incidents]
      summary: Update an incident report
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateIncidentBody"
      responses:
        "200":
          description: Updated incident
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IncidentReport"

  # ── Supporters ───────────────────────────────────────────────────────────
  /supporters:
    get:
      operationId: listSupporters
      tags: [supporters]
      summary: List all supporters
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: type
          in: query
          schema:
            type: ["string", "null"]
        - name: search
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Paginated supporter list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedSupporters"
    post:
      operationId: createSupporter
      tags: [supporters]
      summary: Create a new supporter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupporterBody"
      responses:
        "201":
          description: Supporter created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supporter"

  /supporters/{id}:
    get:
      operationId: getSupporter
      tags: [supporters]
      summary: Get a supporter by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Supporter detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supporter"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateSupporter
      tags: [supporters]
      summary: Update a supporter
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSupporterBody"
      responses:
        "200":
          description: Updated supporter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supporter"
    delete:
      operationId: deleteSupporter
      tags: [supporters]
      summary: Delete a supporter
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /supporters/{id}/lapse-risk:
    get:
      operationId: getSupporterLapseRisk
      tags: [supporters]
      summary: Get donor lapse risk indicators
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lapse risk analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupporterLapseRisk"

  # ── Donations ────────────────────────────────────────────────────────────
  /donations:
    get:
      operationId: listDonations
      tags: [donations]
      summary: List donations
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: supporterId
          in: query
          schema:
            type: ["integer", "null"]
        - name: campaign
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Paginated donations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedDonations"
    post:
      operationId: createDonation
      tags: [donations]
      summary: Record a new donation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDonationBody"
      responses:
        "201":
          description: Donation recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Donation"

  /donations/{id}:
    get:
      operationId: getDonation
      tags: [donations]
      summary: Get donation by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Donation detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Donation"
    patch:
      operationId: updateDonation
      tags: [donations]
      summary: Update a donation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDonationBody"
      responses:
        "200":
          description: Updated donation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Donation"

  /donations/summary:
    get:
      operationId: getDonationSummary
      tags: [donations]
      summary: Get donation summary stats for analytics
      responses:
        "200":
          description: Donation summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DonationSummary"

  # ── Partners ─────────────────────────────────────────────────────────────
  /partners:
    get:
      operationId: listPartners
      tags: [partners]
      summary: List all partners
      responses:
        "200":
          description: List of partners
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Partner"
    post:
      operationId: createPartner
      tags: [partners]
      summary: Create a partner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePartnerBody"
      responses:
        "201":
          description: Partner created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Partner"

  /partners/{id}:
    get:
      operationId: getPartner
      tags: [partners]
      summary: Get a partner by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Partner detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Partner"
    patch:
      operationId: updatePartner
      tags: [partners]
      summary: Update a partner
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePartnerBody"
      responses:
        "200":
          description: Updated partner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Partner"

  # ── Analytics ────────────────────────────────────────────────────────────
  /analytics/donation-trends:
    get:
      operationId: getAdminDonationTrends
      tags: [analytics]
      summary: Get detailed donation trends for staff analytics
      parameters:
        - name: months
          in: query
          schema:
            type: integer
            default: 12
      responses:
        "200":
          description: Donation trends
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DonationTrendPoint"

  /analytics/resident-outcomes:
    get:
      operationId: getResidentOutcomeAnalytics
      tags: [analytics]
      summary: Get resident outcome analytics
      responses:
        "200":
          description: Resident outcome analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResidentOutcomeAnalytics"

  /analytics/safehouse-comparison:
    get:
      operationId: getSafehouseComparison
      tags: [analytics]
      summary: Get safehouse comparison metrics
      responses:
        "200":
          description: Safehouse comparison data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SafehouseComparisonItem"

  /analytics/at-risk-residents:
    get:
      operationId: getAtRiskResidents
      tags: [analytics]
      summary: Get list of at-risk residents for alerts
      responses:
        "200":
          description: At-risk resident list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AtRiskResidentSummary"

  /analytics/lapsing-donors:
    get:
      operationId: getLapsingDonors
      tags: [analytics]
      summary: Get donors at risk of lapsing
      responses:
        "200":
          description: Lapsing donor list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LapsingDonorSummary"

  # ── Social Media ─────────────────────────────────────────────────────────
  /social-media:
    get:
      operationId: listSocialMediaPosts
      tags: [social-media]
      summary: List social media posts
      responses:
        "200":
          description: List of social media posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SocialMediaPost"
    post:
      operationId: createSocialMediaPost
      tags: [social-media]
      summary: Create a social media post record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSocialMediaPostBody"
      responses:
        "201":
          description: Post created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SocialMediaPost"

  /social-media/{id}:
    patch:
      operationId: updateSocialMediaPost
      tags: [social-media]
      summary: Update a social media post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSocialMediaPostBody"
      responses:
        "200":
          description: Updated post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SocialMediaPost"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    # ── Auth ──────────────────────────────────────────────────────────────
    LoginBody:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required: [username, password]

    AuthUser:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        displayName:
          type: string
        role:
          type: string
          enum: [admin, staff, donor]
        email:
          type: ["string", "null"]
      required: [id, username, displayName, role]

    # ── Contact Form ──────────────────────────────────────────────────────
    ContactFormBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        message:
          type: string
        language:
          type: string
          enum: [en, id]
          default: en
        isHelpRequest:
          type: boolean
          default: false
      required: [name, message]

    # ── Public Impact ─────────────────────────────────────────────────────
    PublicImpactSnapshot:
      type: object
      properties:
        totalResidentsHelped:
          type: integer
        activeResidents:
          type: integer
        totalDonationsReceived:
          type: number
        totalSafehouses:
          type: integer
        reintegrationRate:
          type: number
        lastUpdated:
          type: string
      required: [totalResidentsHelped, activeResidents, totalDonationsReceived, totalSafehouses, reintegrationRate, lastUpdated]

    PublicSafehouse:
      type: object
