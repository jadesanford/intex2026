kind = "web"
previewPath = "/"
title = "Open Arms"
version = "1.0.0"
id = "artifacts/open-arms"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18616

[services.development]
run = "npm --prefix /home/runner/workspace/frontend run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/open-arms", "run", "build" ]
publicDir = "artifacts/open-arms/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18616"
BASE_PATH = "/"
